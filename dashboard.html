<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Office - Панель управления</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
    .fade-in-1 { animation-delay: 0.05s; }
    .fade-in-2 { animation-delay: 0.1s; }
    .fade-in-3 { animation-delay: 0.15s; }
    .fade-in-4 { animation-delay: 0.2s; }
    .fade-in-5 { animation-delay: 0.25s; }
    .fade-in-6 { animation-delay: 0.3s; }
    .fade-in-7 { animation-delay: 0.35s; }
  </style>
</head>
<body class="font-sans bg-slate-50 min-h-screen">

  <!-- Top Bar -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center gap-8">
        <img src="logo-dark.svg" alt="Digital Office" class="h-5">
        <!-- Nav (admin & manager only) -->
        <nav id="mainNav" class="hidden md:flex items-center gap-1 text-sm font-medium">
        </nav>
      </div>

      <!-- Right side -->
      <div class="flex items-center gap-4">
        <!-- Role badge -->
        <span id="roleBadge" class="hidden sm:inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full"></span>

        <!-- User menu -->
        <div class="relative">
          <button id="userMenuBtn" class="flex items-center gap-2.5 hover:bg-slate-50 rounded-xl px-3 py-2 transition-colors">
            <div id="userAvatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold"></div>
            <div class="hidden sm:block text-left">
              <p id="userName" class="text-sm font-semibold text-slate-900 leading-tight"></p>
              <p id="userTitle" class="text-xs text-slate-500 leading-tight"></p>
            </div>
            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
          </button>

          <!-- Dropdown -->
          <div id="userDropdown" class="hidden absolute right-0 top-12 w-56 bg-white rounded-xl shadow-lg shadow-slate-200/50 border border-slate-200 py-2 z-50">
            <div class="px-4 py-2 border-b border-slate-100 sm:hidden">
              <p id="dropName" class="text-sm font-semibold text-slate-900"></p>
              <p id="dropEmail" class="text-xs text-slate-500"></p>
            </div>
            <a href="#" class="flex items-center gap-2.5 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
              <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
              Мой профиль
            </a>
            <a href="#" id="settingsLink" class="flex items-center gap-2.5 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
              <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i>
              Настройки
            </a>
            <div class="border-t border-slate-100 my-1"></div>
            <button id="logoutBtn" class="w-full flex items-center gap-2.5 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors">
              <i data-lucide="log-out" class="w-4 h-4"></i>
              Выйти из системы
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Welcome -->
    <div class="mb-8 fade-in fade-in-1">
      <h1 class="text-2xl font-bold text-slate-900 mb-1">Добро пожаловать, <span id="greetName"></span></h1>
      <p class="text-slate-500" id="greetSub"></p>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="statsGrid">
      <!-- Stats injected by JS based on role -->
    </div>

    <!-- Two-column layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Left column (2/3) -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Quick Actions -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 fade-in fade-in-4">
          <h2 class="text-lg font-semibold text-slate-900 mb-4">Быстрые действия</h2>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="quickActions">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Recent Activity -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 fade-in fade-in-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-slate-900">Последние действия</h2>
            <span class="text-xs text-slate-400">Сегодня</span>
          </div>
          <div class="space-y-4" id="activityFeed">
            <!-- Injected by JS -->
          </div>
        </div>
      </div>

      <!-- Right column (1/3) -->
      <div class="space-y-6">
        <!-- Profile Card -->
        <div class="bg-white rounded-2xl border border-slate-200 p-6 fade-in fade-in-6">
          <h2 class="text-lg font-semibold text-slate-900 mb-4">Мой профиль</h2>
          <div class="text-center mb-4">
            <div id="profileAvatar" class="w-16 h-16 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-3"></div>
            <p id="profileName" class="font-semibold text-slate-900"></p>
            <p id="profileTitle" class="text-sm text-slate-500"></p>
          </div>
          <div class="space-y-3 text-sm">
            <div class="flex items-center gap-3 text-slate-600">
              <i data-lucide="mail" class="w-4 h-4 text-slate-400 shrink-0"></i>
              <span id="profileEmail" class="truncate"></span>
            </div>
            <div class="flex items-center gap-3 text-slate-600">
              <i data-lucide="shield" class="w-4 h-4 text-slate-400 shrink-0"></i>
              <span id="profileRole"></span>
            </div>
            <div class="flex items-center gap-3 text-slate-600">
              <i data-lucide="clock" class="w-4 h-4 text-slate-400 shrink-0"></i>
              <span id="profileLogin"></span>
            </div>
          </div>
        </div>

        <!-- System Info (admin only) -->
        <div id="systemInfo" class="bg-white rounded-2xl border border-slate-200 p-6 hidden fade-in fade-in-7">
          <h2 class="text-lg font-semibold text-slate-900 mb-4">Система</h2>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between">
              <span class="text-slate-500">Версия</span>
              <span class="font-medium text-slate-900">1.0.0</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-500">Пользователей</span>
              <span class="font-medium text-slate-900">3</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-500">Статус</span>
              <span class="inline-flex items-center gap-1 font-medium text-emerald-600">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                Активна
              </span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-500">Среда</span>
              <span class="font-medium text-slate-900">Production</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center text-sm text-slate-400">
      &copy; 2026 Adata. Digital Office — продукт компании Adata.
    </div>
  </footer>

  <script>
    // ── Auth Guard ──
    const session = JSON.parse(localStorage.getItem('do_session') || 'null');
    if (!session) {
      window.location.href = 'login.html';
    }

    const { name, email, role, title, loginAt } = session || {};

    // ── Role config ──
    const ROLE_CONFIG = {
      admin: {
        color: 'bg-indigo-600',
        badgeClass: 'bg-indigo-50 text-indigo-700 border border-indigo-200',
        label: 'Администратор',
        nav: ['Главная', 'Сотрудники', 'Документы', 'Отчёты', 'Настройки'],
        stats: [
          { icon: 'users', label: 'Сотрудники', value: '24', change: '+3 за месяц', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'file-text', label: 'Документы', value: '156', change: '12 на подпись', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'file-signature', label: 'Подписи ЭЦП', value: '89', change: '5 ожидают', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'building', label: 'Контрагенты', value: '18', change: '+2 новых', color: 'text-violet-600', bg: 'bg-violet-50' }
        ],
        actions: [
          { icon: 'user-plus', label: 'Добавить сотрудника', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'file-plus', label: 'Создать документ', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'file-signature', label: 'Подписать ЭЦП', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'building-2', label: 'Добавить контрагента', color: 'text-violet-600', bg: 'bg-violet-50' },
          { icon: 'bar-chart-3', label: 'Отчёты', color: 'text-sky-600', bg: 'bg-sky-50' },
          { icon: 'settings', label: 'Настройки', color: 'text-slate-600', bg: 'bg-slate-100' }
        ],
        activity: [
          { icon: 'user-plus', text: 'Добавлен новый сотрудник <b>Иванов А.С.</b>', time: '10 мин назад', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'file-signature', text: 'Подписан договор <b>№ 2026-0412</b> c ТОО "Альфа"', time: '1 час назад', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'file-text', text: 'Создан приказ о приёме <b>Петрова М.К.</b>', time: '2 часа назад', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'log-in', text: 'Вход в систему пользователя <b>timeke@adata.kz</b>', time: '3 часа назад', color: 'text-slate-500', bg: 'bg-slate-100' }
        ]
      },
      manager: {
        color: 'bg-emerald-600',
        badgeClass: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
        label: 'Менеджер',
        nav: ['Главная', 'Сотрудники', 'Документы', 'Отчёты'],
        stats: [
          { icon: 'users', label: 'Команда', value: '8', change: 'Ваш отдел', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'file-text', label: 'Документы', value: '42', change: '3 на подпись', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'file-signature', label: 'Подписи ЭЦП', value: '28', change: '2 ожидают', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'clipboard-check', label: 'Задачи', value: '5', change: 'В работе', color: 'text-violet-600', bg: 'bg-violet-50' }
        ],
        actions: [
          { icon: 'file-plus', label: 'Создать документ', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'file-signature', label: 'Подписать ЭЦП', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'users', label: 'Моя команда', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'bar-chart-3', label: 'Отчёты', color: 'text-sky-600', bg: 'bg-sky-50' },
          { icon: 'clipboard-check', label: 'Мои задачи', color: 'text-violet-600', bg: 'bg-violet-50' },
          { icon: 'message-square', label: 'Сообщения', color: 'text-slate-600', bg: 'bg-slate-100' }
        ],
        activity: [
          { icon: 'file-signature', text: 'Подписан акт <b>№ 2026-0398</b>', time: '30 мин назад', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'file-text', text: 'Создана заявка на отпуск <b>Сидорова Е.В.</b>', time: '2 часа назад', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'clipboard-check', text: 'Завершена задача <b>"Квартальный отчёт"</b>', time: '4 часа назад', color: 'text-indigo-600', bg: 'bg-indigo-50' }
        ]
      },
      user: {
        color: 'bg-slate-600',
        badgeClass: 'bg-slate-100 text-slate-700 border border-slate-200',
        label: 'Пользователь',
        nav: ['Главная', 'Мои документы'],
        stats: [
          { icon: 'file-text', label: 'Мои документы', value: '12', change: '1 новый', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'file-signature', label: 'На подпись', value: '2', change: 'Ожидают', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'clipboard-check', label: 'Задачи', value: '3', change: 'В работе', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'calendar', label: 'Отпуск', value: '18', change: 'Дней осталось', color: 'text-violet-600', bg: 'bg-violet-50' }
        ],
        actions: [
          { icon: 'file-text', label: 'Мои документы', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'file-signature', label: 'Подписать', color: 'text-amber-600', bg: 'bg-amber-50' },
          { icon: 'calendar', label: 'Заявка на отпуск', color: 'text-emerald-600', bg: 'bg-emerald-50' },
          { icon: 'message-square', label: 'Сообщения', color: 'text-slate-600', bg: 'bg-slate-100' }
        ],
        activity: [
          { icon: 'file-text', text: 'Получен документ <b>"Доп. соглашение №3"</b>', time: '1 час назад', color: 'text-indigo-600', bg: 'bg-indigo-50' },
          { icon: 'file-signature', text: 'Требуется подпись: <b>Акт сверки за март</b>', time: '3 часа назад', color: 'text-amber-600', bg: 'bg-amber-50' }
        ]
      }
    };

    const cfg = ROLE_CONFIG[role] || ROLE_CONFIG.user;

    // ── Render UI ──

    // Initials
    const initials = name ? name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : '?';

    // Header
    document.getElementById('userAvatar').className = `w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold ${cfg.color}`;
    document.getElementById('userAvatar').textContent = initials;
    document.getElementById('userName').textContent = name;
    document.getElementById('userTitle').textContent = title;

    // Role badge
    const badge = document.getElementById('roleBadge');
    badge.className = `hidden sm:inline-flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full ${cfg.badgeClass}`;
    badge.innerHTML = `<i data-lucide="shield" class="w-3 h-3"></i>${cfg.label}`;

    // Nav
    const nav = document.getElementById('mainNav');
    cfg.nav.forEach((item, i) => {
      const a = document.createElement('a');
      a.href = '#';
      a.className = i === 0
        ? 'px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-700'
        : 'px-3 py-1.5 rounded-lg text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors';
      a.textContent = item;
      nav.appendChild(a);
    });

    // Greeting
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';
    document.getElementById('greetName').textContent = name.split(' ')[0];
    document.getElementById('greetSub').textContent = `${greeting}! Вот краткая сводка по вашей рабочей области.`;

    // Stats
    const statsGrid = document.getElementById('statsGrid');
    cfg.stats.forEach((s, i) => {
      statsGrid.innerHTML += `
        <div class="bg-white rounded-2xl border border-slate-200 p-5 fade-in fade-in-${i + 2}">
          <div class="flex items-center justify-between mb-3">
            <div class="w-10 h-10 ${s.bg} rounded-xl flex items-center justify-center">
              <i data-lucide="${s.icon}" class="w-5 h-5 ${s.color}"></i>
            </div>
          </div>
          <p class="text-2xl font-bold text-slate-900">${s.value}</p>
          <p class="text-sm text-slate-500 mt-0.5">${s.label}</p>
          <p class="text-xs ${s.color} mt-1 font-medium">${s.change}</p>
        </div>`;
    });

    // Quick Actions
    const actionsGrid = document.getElementById('quickActions');
    cfg.actions.forEach(a => {
      actionsGrid.innerHTML += `
        <button class="flex flex-col items-center gap-2.5 p-4 rounded-xl border border-slate-100 hover:border-slate-200 hover:bg-slate-50 transition-all group">
          <div class="w-10 h-10 ${a.bg} rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform">
            <i data-lucide="${a.icon}" class="w-5 h-5 ${a.color}"></i>
          </div>
          <span class="text-sm font-medium text-slate-700">${a.label}</span>
        </button>`;
    });

    // Activity
    const feed = document.getElementById('activityFeed');
    cfg.activity.forEach(a => {
      feed.innerHTML += `
        <div class="flex items-start gap-3">
          <div class="w-8 h-8 ${a.bg} rounded-lg flex items-center justify-center shrink-0 mt-0.5">
            <i data-lucide="${a.icon}" class="w-4 h-4 ${a.color}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-slate-700">${a.text}</p>
            <p class="text-xs text-slate-400 mt-0.5">${a.time}</p>
          </div>
        </div>`;
    });

    // Profile card
    document.getElementById('profileAvatar').className = `w-16 h-16 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-3 ${cfg.color}`;
    document.getElementById('profileAvatar').textContent = initials;
    document.getElementById('profileName').textContent = name;
    document.getElementById('profileTitle').textContent = title;
    document.getElementById('profileEmail').textContent = email;
    document.getElementById('profileRole').textContent = cfg.label;

    // Login time
    const loginDate = new Date(loginAt);
    document.getElementById('profileLogin').textContent = `Вход: ${loginDate.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}`;

    // Dropdown name (mobile)
    document.getElementById('dropName').textContent = name;
    document.getElementById('dropEmail').textContent = email;

    // System info (admin only)
    if (role === 'admin') {
      document.getElementById('systemInfo').classList.remove('hidden');
    }

    // Settings link (admin only)
    if (role === 'user') {
      document.getElementById('settingsLink').classList.add('hidden');
    }

    // ── Interactions ──

    // User menu toggle
    document.getElementById('userMenuBtn').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('userDropdown').classList.toggle('hidden');
    });
    document.addEventListener('click', () => {
      document.getElementById('userDropdown').classList.add('hidden');
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('do_session');
      window.location.href = 'login.html';
    });

    // Init icons
    lucide.createIcons();
  </script>
</body>
</html>
