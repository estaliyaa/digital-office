<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Office - Код подтверждения</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Hide number input spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="font-sans bg-slate-50 min-h-screen flex">

  <!-- Left Panel - Branding -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-indigo-600 via-indigo-700 to-slate-900 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full">
      <div class="absolute top-20 left-20 w-72 h-72 bg-white/5 rounded-full blur-3xl"></div>
      <div class="absolute bottom-32 right-16 w-96 h-96 bg-indigo-400/10 rounded-full blur-3xl"></div>
      <div class="absolute top-1/2 left-1/3 w-48 h-48 bg-violet-400/10 rounded-full blur-2xl"></div>
    </div>

    <div class="relative z-10 flex flex-col justify-between p-12 w-full">
      <div>
        <img src="logo.svg" alt="Digital Office" class="h-6">
      </div>

      <div class="max-w-md">
        <h1 class="text-4xl font-bold text-white leading-tight mb-6">
          Проверьте<br>вашу почту
        </h1>
        <p class="text-indigo-200 text-lg leading-relaxed">
          Мы отправили 6-значный код подтверждения на вашу электронную почту. Введите его ниже для сброса пароля.
        </p>
      </div>

      <p class="text-indigo-300/60 text-sm">&copy; 2026 Adata. Digital Office — продукт компании Adata.</p>
    </div>
  </div>

  <!-- Right Panel - Verification Form -->
  <div class="flex-1 flex items-center justify-center p-6 sm:p-12">
    <div class="w-full max-w-md">
      <!-- Mobile logo -->
      <div class="mb-10 lg:hidden">
        <img src="logo-dark.svg" alt="Digital Office" class="h-6">
      </div>

      <!-- Back link -->
      <a href="forgot-password.html" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-slate-700 transition-colors mb-8">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
        Назад
      </a>

      <!-- Icon -->
      <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6">
        <i data-lucide="shield-check" class="w-7 h-7 text-indigo-600"></i>
      </div>

      <!-- Header -->
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Введите код подтверждения</h2>
        <p class="text-slate-500">Мы отправили код на <span class="font-medium text-slate-700">j***@company.com</span></p>
      </div>

      <!-- Code inputs -->
      <form onsubmit="return false;">
        <div class="flex gap-3 mb-8">
          <input type="number" min="0" max="9" maxlength="1" class="code-input w-full h-14 text-center text-xl font-semibold text-slate-900 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" autofocus>
          <input type="number" min="0" max="9" maxlength="1" class="code-input w-full h-14 text-center text-xl font-semibold text-slate-900 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
          <input type="number" min="0" max="9" maxlength="1" class="code-input w-full h-14 text-center text-xl font-semibold text-slate-900 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
          <input type="number" min="0" max="9" maxlength="1" class="code-input w-full h-14 text-center text-xl font-semibold text-slate-900 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
          <input type="number" min="0" max="9" maxlength="1" class="code-input w-full h-14 text-center text-xl font-semibold text-slate-900 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
          <input type="number" min="0" max="9" maxlength="1" class="code-input w-full h-14 text-center text-xl font-semibold text-slate-900 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
        </div>

        <!-- Submit -->
        <a
          href="reset-password.html"
          class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 mb-6"
        >
          Подтвердить
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </a>

        <!-- Resend -->
        <p class="text-center text-sm text-slate-500">
          Не получили код?
          <button type="button" id="resendBtn" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">
            Отправить повторно
          </button>
          <span id="timer" class="font-medium text-slate-400 hidden"></span>
        </p>
      </form>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Auto-focus and auto-advance code inputs
    const inputs = document.querySelectorAll('.code-input');

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const value = e.target.value;
        if (value.length > 1) {
          e.target.value = value.slice(-1);
        }
        if (value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          inputs[index - 1].focus();
        }
      });

      // Handle paste
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((char, i) => {
          if (inputs[index + i]) {
            inputs[index + i].value = char;
          }
        });
        const nextIndex = Math.min(index + pasted.length, inputs.length - 1);
        inputs[nextIndex].focus();
      });
    });

    // Resend timer
    const resendBtn = document.getElementById('resendBtn');
    const timerSpan = document.getElementById('timer');

    resendBtn.addEventListener('click', () => {
      let seconds = 60;
      resendBtn.classList.add('hidden');
      timerSpan.classList.remove('hidden');
      timerSpan.textContent = `Повторно через ${seconds}с`;

      const interval = setInterval(() => {
        seconds--;
        timerSpan.textContent = `Повторно через ${seconds}с`;
        if (seconds <= 0) {
          clearInterval(interval);
          resendBtn.classList.remove('hidden');
          timerSpan.classList.add('hidden');
        }
      }, 1000);
    });
  </script>
</body>
</html>
